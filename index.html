                        body: 'On a Floor cleared in optimal moves, restores Energy equal to your highest Boon stack count. Jump stacks also satisfy the trigger; Shuffle stacks do not.'
                    };
                }
                if (id === 'jump') {
                    return {
                        title: `Jump (×${count})`,
                        body: 'Click to arm. Next move travels 2 squares and may pass over impassable Tiles. Consumes 1 stack on use. Counts toward Efficiency trigger.'
                    };
                }
                if (id === 'shuffle') {
                    return {
                        title: `Shuffle (×${count})`,
                        body: 'Click to randomize all Tiles on the current Floor (including Exit). Costs 3 Energy + 1 stack. Can lock the player in. Disables Efficiency for this Floor.'
                    };
                }
                return { title: '', body: '' };
            }

            function renderActiveRelics() {
                els.activeRelics.innerHTML = '';
                RELIC_DEFS.forEach(def => {
                    const count = G.relicStacks[def.id] || 0;
                    if (count <= 0) return;
                    const div = document.createElement('div');
                    div.className = `reward-icon-container ${def.cls}`;
                    if (G.activeAbility === def.id) div.classList.add('armed');
                    div.textContent = def.icon;
                    const sub = document.createElement('span');
                    sub.className = 'stack-count';
                    sub.textContent = count;
                    div.appendChild(sub);
                    div.dataset.relicId = def.id;
                    div.addEventListener('mouseenter', (e) => {
                        const tt = relicTooltip(def.id);
                        setTooltip(tt.title, tt.body);
                        els.tooltip.style.display = 'block';
                        updateTooltipPosition(e);
                    });
                    div.addEventListener('mousemove', updateTooltipPosition);
                    div.addEventListener('mouseleave', () => els.tooltip.style.display = 'none');
                    if (def.activatable) {
                        div.addEventListener('click', () => activateRelic(def.id));
                    }
                    els.activeRelics.appendChild(div);
                });
            }

            function renderActiveRewards() {
                els.activeRewards.innerHTML = '';
                for (let [id, count] of Object.entries(G.rewards)) {
                    if (count <= 0) continue;
                    const rInfo = ALL_REWARDS.find(r => r.id === id);
                    if (!rInfo) continue;

                    const div = document.createElement('div');
                    div.className = `reward-icon-container ${rInfo.type}`;
                    div.dataset.rewardId = id;
                    div.textContent = rInfo.icon;

                    const sub = document.createElement('span');
                    sub.className = 'stack-count';
                    sub.textContent = count;
                    div.appendChild(sub);

                    if (id === 'momentum') {
                        const stepSub = document.createElement('span');
                        stepSub.className = 'step-count';
                        stepSub.textContent = G.steps % 10;
                        div.appendChild(stepSub);
                    }

                    div.addEventListener('mouseenter', (e) => {
                        setTooltip(fullRewardName(rInfo), rInfo.desc(count));
                        els.tooltip.style.display = 'block';
                        updateTooltipPosition(e);
                    });
                    div.addEventListener('mousemove', updateTooltipPosition);
                    div.addEventListener('mouseleave', () => els.tooltip.style.display = 'none');

                    els.activeRewards.appendChild(div);
                }
            }

            function signedDelta(n) {
                if (n === 0) return null;
                const cls = n > 0 ? 'delta-pos' : 'delta-neg';
                const sign = n > 0 ? '+' : '';
                return `<span class="${cls}">${sign}${n}</span>`;
            }

            function statsRow(label, base, current) {
                const delta = current - base;
                const deltaTxt = signedDelta(delta);
                const valueCol = deltaTxt ? `${base} → ${current} (${deltaTxt})` : `${current}`;
                return `<div class="stats-row"><span>${label}</span><span>${valueCol}</span></div>`;
            }

            function statsLine(label, value) {
                if (value === 0) return '';
                const cls = value > 0 ? 'delta-pos' : 'delta-neg';
                const sign = value > 0 ? '+' : '';
                return `<div class="stats-row"><span>${label}</span><span class="${cls}">${sign}${value}</span></div>`;
            }

            function renderStats() {
                if (els.statsPanel.style.display === 'none') return;
                const base = CONFIG.energy;
                let html = `<div class="stats-section-title">CORE</div>`;
                html += statsRow('Max Energy', base.start, getMaxEnergy());
                html += statsRow('Effective Cap', base.start, getEffectiveCap());
                html += statsRow('Heavy Cost', base.heavy, getHeavyCost());
                html += statsRow('Cracked Cost', base.cracked, getCrackedCost());
                html += statsRow('Power Gain', base.powerGain, getPowerGain(false));

                let firstPwr = getPowerGain(true);
                if (firstPwr !== getPowerGain(false)) {
                    html += statsRow('First Power/Floor', base.powerGain, firstPwr);
                }

                let perEvent = '';
                perEvent += statsLine('Cracked recover', getCrackedRecycle() - getCrackedDrain());
                perEvent += statsLine('Heavy recover', getHeavyRecover() - getHeavyDrain());
                perEvent += statsLine('Exit on arrival', getExitBonus() - getExitDrain());
                perEvent += statsLine('Floor entry', getLevelStartBonus() - getLevelStartDrain());
                if (perEvent) html += `<div class="stats-section-title">PER EVENT</div>${perEvent}`;

                let tempo = '';
                const t10 = (stk('momentum') - stk('slow_leak'));
                const t5  = (stk('tempo_5')  - stk('leak'));
                const t3  = (stk('tempo_3')  - stk('rapid_leak'));
                const stride10 = (stk('firm_grip') ? -stk('firm_grip') : 0) + stk('stride_decay');
                tempo += statsLine('Every 10 steps', t10);
                tempo += statsLine('Every 5 steps', t5);
                tempo += statsLine('Every 3 steps', t3);
                if (stride10 !== 0) tempo += statsLine('10th-step cost', stride10);
                if (tempo) html += `<div class="stats-section-title">PERIODIC</div>${tempo}`;

                let relicHtml = '';
                if ((G.relicStacks.efficiency || 0) > 0) relicHtml += `<div class="stats-row"><span>💎 Efficiency</span><span class="delta-pos">×${G.relicStacks.efficiency}</span></div>`;
                if ((G.relicStacks.jump || 0) > 0)       relicHtml += `<div class="stats-row"><span>🦘 Jump</span><span class="delta-pos">×${G.relicStacks.jump}</span></div>`;
                if ((G.relicStacks.shuffle || 0) > 0)    relicHtml += `<div class="stats-row"><span>🔀 Shuffle</span><span class="delta-pos">×${G.relicStacks.shuffle}</span></div>`;
                const efficiencyTrigger = (G.relicStacks.efficiency || 0) + (G.relicStacks.jump || 0);
                if (efficiencyTrigger > 0) {
                    const payout = maxBoonStacks();
                    relicHtml += `<div class="stats-row"><span>Efficiency payout</span><span class="${payout > 0 ? 'delta-pos' : ''}">+${payout} on optimal</span></div>`;
                }
                if (relicHtml) html += `<div class="stats-section-title">RELICS</div>${relicHtml}`;

                let perm = '';
                if (G.permanentMaxBonus !== 0) perm += statsLine('Permanent Max', G.permanentMaxBonus);
                if (G.minMovesThisLevel > 0) perm += `<div class="stats-row"><span>Floor optimal</span><span>${G.steps} / ${G.minMovesThisLevel}</span></div>`;
                if (G.shuffledThisLevel) perm += `<div class="stats-row"><span>Shuffled</span><span class="delta-neg">Efficiency suppressed</span></div>`;
                if (perm) html += `<div class="stats-section-title">RUN</div>${perm}`;

                els.statsPanel.innerHTML = html;
            }

            // Dev panel
            function showDevPwPrompt() {
                els.devPanel.innerHTML = `<div id="dev-pw-prompt">
                    <input type="password" id="dev-pw-input" placeholder="Password" autocomplete="off" />
                    <button id="dev-pw-submit">UNLOCK</button>
                </div>`;
                const input = document.getElementById('dev-pw-input');
                const submit = document.getElementById('dev-pw-submit');
                const tryUnlock = () => {
                    if (input.value === 'godmode') {
                        G.devUnlocked = true;
                        renderDevPanel();
                    } else {
                        input.value = '';
                        input.placeholder = 'Wrong password';
                    }
                };
                submit.addEventListener('click', tryUnlock);
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') { e.preventDefault(); tryUnlock(); }
                });
                input.focus();
            }

            function renderDevPanel() {
                if (!G.devUnlocked) { showDevPwPrompt(); return; }
                let html = '<div class="stats-section-title">BOONS</div>';
                BOONS.forEach(b => {
                    const stacks = stk(b.id);
                    html += `<div class="dev-row" data-reward="${b.id}">
                        <span class="dev-label">${b.icon} ${fullRewardName(b)}</span>
                        <span class="dev-stack">×${stacks}</span>
                        <span class="dev-controls">
                            <button data-id="${b.id}" data-d="-1">−</button>
                            <button data-id="${b.id}" data-d="1">+</button>
                        </span>
                    </div>`;
                });
                html += '<div class="stats-section-title">BANES</div>';
                BANES.forEach(b => {
                    const stacks = stk(b.id);
                    html += `<div class="dev-row" data-reward="${b.id}">
                        <span class="dev-label">${b.icon} ${fullRewardName(b)}</span>
                        <span class="dev-stack">×${stacks}</span>
                        <span class="dev-controls">
                            <button data-id="${b.id}" data-d="-1">−</button>
                            <button data-id="${b.id}" data-d="1">+</button>
                        </span>
                    </div>`;
                });
                html += '<div class="stats-section-title">RELICS</div>';
                RELIC_DEFS.forEach(def => {
                    const stacks = G.relicStacks[def.id] || 0;
                    html += `<div class="dev-row" data-relic-id="${def.id}">
                        <span class="dev-label">${def.icon} ${def.name}</span>
                        <span class="dev-stack">×${stacks}</span>
                        <span class="dev-controls">
                            <button data-relic="${def.id}" data-d="-1">−</button>
                            <button data-relic="${def.id}" data-d="1">+</button>
                        </span>
                    </div>`;
                });
                els.devPanel.innerHTML = html;
                els.devPanel.querySelectorAll('button[data-id]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.dataset.id;
                        const d = parseInt(btn.dataset.d);
                        G.rewards[id] = Math.max(0, (G.rewards[id] || 0) + d);
                        if (G.rewards[id] === 0) delete G.rewards[id];
                        renderDevPanel();
                        renderActiveRewards();
                        renderActiveRelics();
                        renderStats();
                        render();
                    });
                });
                els.devPanel.querySelectorAll('button[data-relic]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.dataset.relic;
                        const d = parseInt(btn.dataset.d);
                        G.relicStacks[id] = Math.max(0, (G.relicStacks[id] || 0) + d);
                        renderDevPanel();
                        renderActiveRelics();
                        renderStats();
                    });
                });
                els.devPanel.querySelectorAll('.dev-row[data-relic-id]').forEach(row => {
                    const id = row.dataset.relicId;
                    row.addEventListener('mouseenter', (e) => {
                        const tt = relicTooltip(id);
                        setTooltip(tt.title, tt.body);
                        els.tooltip.style.display = 'block';
                        updateTooltipPosition(e);
                    });
                    row.addEventListener('mousemove', updateTooltipPosition);
                    row.addEventListener('mouseleave', () => els.tooltip.style.display = 'none');
                });
                els.devPanel.querySelectorAll('.dev-row[data-reward]').forEach(row => {
                    const reward = ALL_REWARDS.find(r => r.id === row.dataset.reward);
                    if (!reward) return;
                    row.addEventListener('mouseenter', (e) => {
                        const stacks = Math.max(1, stk(reward.id));
                        setTooltip(fullRewardName(reward), reward.desc(stacks));
                        els.tooltip.style.display = 'block';
                        updateTooltipPosition(e);
                    });
                    row.addEventListener('mousemove', updateTooltipPosition);
                    row.addEventListener('mouseleave', () => els.tooltip.style.display = 'none');
                });
            }

            // Game State Flows
            function gameOver() {
                G.isGameOver = true;
                render(); 
                updateLog("SYSTEM CRITICAL FAILURE. Out of energy.");
                els.energy.style.color = 'var(--danger-color)';
                
                setTimeout(() => {
                    showMessage("POWER DEPLETED", `Drone failed on Floor ${G.level + 1}.`, true);
                }, 800);
            }

            function completeLevel() {
                G.isGameOver = true;
                let exitMsg = "EXIT SECURED.";
                const subOptimal = G.minMovesThisLevel > 0 && G.steps < G.minMovesThisLevel;
                const optimal = !subOptimal && G.minMovesThisLevel > 0 && G.steps === G.minMovesThisLevel && !G.shuffledThisLevel;

                if (subOptimal) {
                    let topId = null, topCount = 0;
                    for (const [id, count] of Object.entries(G.rewards)) {
                        const r = ALL_REWARDS.find(x => x.id === id);
                        if (r && r.type === 'boon' && count > topCount) { topCount = count; topId = id; }
                    }
                    if (topId) G.rewards[topId]++;

                    const cap = getEffectiveCap();
                    const oldEnergy = G.energy;
                    if (cap <= 25) {
                        G.energy = cap;
                    } else {
                        G.energy = Math.min(cap, G.energy + Math.floor(cap / 2));
                    }
                    if (G.energy > oldEnergy) flashEnergy('gain');

                    const topName = topId ? fullRewardName(ALL_REWARDS.find(r => r.id === topId)) : null;
                    const refillTxt = (cap <= 25) ? 'Energy refilled' : `+${G.energy - oldEnergy} Energy`;
                    exitMsg = topName
                        ? `SUPER-OPTIMAL RUN. +1 ${topName}, ${refillTxt}.`
                        : `SUPER-OPTIMAL RUN. ${refillTxt}.`;
                } else if (optimal) {
                    const triggerStacks = (G.relicStacks.efficiency || 0) + (G.relicStacks.jump || 0);
                    if (triggerStacks > 0) {
                        const payout = maxBoonStacks();
                        if (payout > 0) {
                            G.energy = Math.min(G.energy + payout, getEffectiveCap());
                            flashEnergy('gain');
                            exitMsg = `PERFECT RUN. Efficiency: +${payout} Energy.`;
                        } else {
                            exitMsg = "PERFECT RUN. (No Boons stacked — Efficiency idle.)";
                        }
                    } else {
                        exitMsg = "PERFECT RUN. (No Efficiency relic — no payout.)";
                    }
                } else if (G.shuffledThisLevel) {
                    exitMsg = "EXIT SECURED. Shuffle suppressed Efficiency.";
                }
                render();
                renderActiveRewards();
                renderActiveRelics();
                renderStats();
                updateLog(exitMsg + " Analyzing next sector...");

                setTimeout(() => {
                    if (G.level + 1 >= GAME_LEVELS.length) {
                        showMessage("CORE SECURED", "VICTORY! You have fully navigated the ruins and stabilized the core.", false);
                    } else {
                        showRewards();
                    }
                }, 900);
            }

            function maxBoonStacks() {
                let m = 0;
                for (const [id, count] of Object.entries(G.rewards)) {
                    const r = ALL_REWARDS.find(x => x.id === id);
                    if (r && r.type === 'boon' && count > m) m = count;
                }
                return m;
            }

            function getShuffled(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(rng() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            function showRewards() {
                els.overlayTitle.textContent = "SYSTEM STABLE";
                els.overlayDesc.textContent = "Select a subroutine package for the next floor:";
                els.choices.innerHTML = '';
                els.actionBtn.style.display = 'none';

                const shuffledBoons = getShuffled(BOONS);
                const shuffledBanes = getShuffled(BANES);
                const usedBoons = new Set();
                const usedBanes = new Set();
                const options = [];

                for (const boon of shuffledBoons) {
                    if (options.length >= 3) break;
                    if (usedBoons.has(boon.id)) continue;
                    for (const bane of shuffledBanes) {
                        if (usedBanes.has(bane.id)) continue;
                        if (CONFLICTS[boon.id] === bane.id) continue;
                        const title = `${CATEGORY_PREFIX[boon.cat]} ${CATEGORY_SUFFIX[bane.cat]}`;
                        options.push({ title, boons: [boon], banes: [bane] });
                        usedBoons.add(boon.id);
                        usedBanes.add(bane.id);
                        break;
                    }
                }

                options.forEach(opt => {
                    const btn = document.createElement('div');
                    btn.className = 'reward-button';

                    let html = `<div class="reward-title">${opt.title}</div>`;
                    opt.boons.forEach(b => html += `<div class="boon-text">+ ${fullRewardName(b)}: ${b.desc(1)}</div>`);
                    opt.banes.forEach(b => html += `<div class="bane-text">- ${fullRewardName(b)}: ${b.desc(1)}</div>`);

                    btn.innerHTML = html;
                    btn.addEventListener('click', () => applyRewardPackage(opt));
                    els.choices.appendChild(btn);
                });

                els.overlay.style.display = 'flex';
            }

            function applyRewardPackage(opt) {
                const oldCap = getEffectiveCap();
                opt.boons.forEach(b => { G.rewards[b.id] = (G.rewards[b.id] || 0) + 1; });
                opt.banes.forEach(b => { G.rewards[b.id] = (G.rewards[b.id] || 0) + 1; });
                const newCap = getEffectiveCap();
                if (newCap > oldCap) G.energy += (newCap - oldCap);

                G.level++;
                els.overlay.style.display = 'none';
                initLevel(G.level);
            }

            function showMessage(title, desc, isRestart) {
                els.overlayTitle.textContent = title;
                els.overlayDesc.textContent = desc;
                els.choices.innerHTML = '';
                els.actionBtn.style.display = 'block';
                
                els.actionBtn.textContent = isRestart ? "REBOOT SYSTEM" : "PLAY AGAIN";
                els.actionBtn.onclick = () => window.location.reload();

                els.overlay.style.display = 'flex';
            }

            // Seed display + click-to-copy
            els.seedDisplay.textContent = SEED;
            els.seedBar.addEventListener('click', () => {
                navigator.clipboard.writeText(String(SEED)).catch(() => {});
                const original = `SEED: ${SEED}`;
                els.seedBar.textContent = 'COPIED';
                setTimeout(() => { els.seedBar.textContent = original; }, 900);
            });

            els.opacityToggle.addEventListener('click', () => {
                els.gameWrapper.classList.toggle('faded');
            });

            updateLog('SYSTEM ONLINE. Find EXIT.');

            els.statsToggle.addEventListener('click', () => {
                const open = els.statsPanel.style.display !== 'none';
                els.statsPanel.style.display = open ? 'none' : 'block';
                els.statsToggle.textContent = open ? '▸ STATS' : '▾ STATS';
                if (!open) renderStats();
            });
            els.devToggle.addEventListener('click', () => {
                const open = els.devPanel.style.display !== 'none';
                els.devPanel.style.display = open ? 'none' : 'block';
                els.devToggle.textContent = open ? '▸ DEV' : '▾ DEV';
                if (!open) renderDevPanel();
            });

            document.addEventListener('keydown', (e) => {
                if (G.isGameOver) return;
                if (els.overlay.style.display === 'flex') return;
                const tag = e.target && e.target.tagName;
                if (tag === 'INPUT' || tag === 'TEXTAREA') return;
                let dr = 0, dc = 0;
                switch (e.key.toLowerCase()) {
                    case 'arrowup': case 'w': dr = -1; break;
                    case 'arrowdown': case 's': dr = 1; break;
                    case 'arrowleft': case 'a': dc = -1; break;
                    case 'arrowright': case 'd': dc = 1; break;
                    default: return;
                }
                e.preventDefault();
                const cur = GAME_LEVELS[G.level];
                const stride = (G.activeAbility === 'jump') ? 2 : 1;
                const nr = G.playerPos[0] + dr * stride;
                const nc = G.playerPos[1] + dc * stride;
                if (nr < 0 || nr >= cur.rows || nc < 0 || nc >= cur.cols) return;
                handleTileClick(nr, nc);
            });

            // Boot up game
            initLevel(0);
        });
    </script>
</body>
</html>
